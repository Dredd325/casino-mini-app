<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinTon — Царь горы</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ton-blue: #0088cc;
            --ton-dark: #006699;
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --border-color: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent-gold: #ffd966;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .app-container {
            max-width: 430px;
            width: 100%;
            background: var(--bg-dark);
            min-height: 100vh;
            padding-bottom: 20px;
        }

        /* ШАПКА */
        .header {
            background: linear-gradient(165deg, #0066aa 0%, #004477 100%);
            padding: 50px 16px 25px 16px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-btn {
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 30px;
            cursor: pointer;
        }

        .title-section {
            text-align: center;
        }

        .main-title {
            font-size: 26px;
            font-weight: 800;
            color: white;
        }

        .sub-title {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .menu-btn {
            width: 44px;
            height: 44px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .menu-dot {
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
        }

        /* Баланс */
        .balance-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .balance-card {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .balance-icon {
            background: var(--ton-blue);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .balance-info {
            flex: 1;
        }

        .balance-label {
            font-size: 12px;
            color: #aaa;
        }

        .balance-amount {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .deposit-btn {
            background: var(--ton-blue);
            border: none;
            border-radius: 30px;
            padding: 0 20px;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        /* Таймер */
        .timer-container {
            text-align: center;
        }

        .timer-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 5px;
        }

        .main-timer {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 2px;
            color: white;
            text-shadow: 0 0 10px rgba(0,136,204,0.5);
        }

        /* Баннер */
        .banner {
            background: #022b40;
            padding: 16px;
            margin: 0 16px 20px 16px;
            border-radius: 20px;
            cursor: pointer;
        }

        .banner-title {
            font-size: 16px;
            font-weight: 600;
            color: white;
            margin-bottom: 5px;
        }

        .banner-link {
            color: #44aaff;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Контент */
        .content {
            padding: 0 16px;
        }

        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .stat-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 15px 5px;
            text-align: center;
        }

        .stat-icon {
            width: 36px;
            height: 36px;
            background: rgba(0,136,204,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
        }

        .stat-icon i {
            color: var(--ton-blue);
            font-size: 18px;
        }

        .stat-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        /* Позиция */
        .section-header {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .user-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .user-rank {
            font-size: 20px;
            font-weight: 700;
            color: var(--ton-blue);
            min-width: 35px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--ton-blue);
            color: var(--ton-blue);
            font-size: 20px;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            color: white;
            margin-bottom: 2px;
        }

        .user-stats {
            font-size: 11px;
            color: #666;
        }

        .user-prize {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-gold);
        }

        /* Топ */
        .top-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .top-rank {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            background: var(--ton-blue);
            color: white;
        }

        .top-rank.gold { background: #f5a623; }
        .top-rank.silver { background: #9b9b9b; }
        .top-rank.bronze { background: #b87333; }

        .top-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--ton-blue);
            color: var(--ton-blue);
        }

        .top-info {
            flex: 1;
        }

        .top-name {
            font-weight: 500;
            color: white;
        }

        .top-amount {
            font-weight: 600;
            color: var(--accent-gold);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .ton-badge {
            background: var(--ton-blue);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        /* Кнопки */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin: 20px 16px;
        }

        .action-button {
            flex: 1;
            background: var(--ton-blue);
            border: none;
            border-radius: 30px;
            padding: 16px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .action-button.secondary {
            background: var(--card-bg);
            border: 1px solid var(--ton-blue);
        }

        /* Модалка */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 25px;
            max-width: 340px;
            width: 100%;
            border: 1px solid var(--border-color);
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--ton-blue);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-input {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: white;
            font-size: 18px;
            margin: 15px 0;
        }

        .modal-button {
            background: var(--ton-blue);
            border: none;
            color: white;
            font-weight: 600;
            padding: 16px;
            border-radius: 30px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .modal-button.secondary {
            background: transparent;
            border: 1px solid var(--border-color);
        }

        /* Уведомление */
        .notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border-left: 4px solid var(--ton-blue);
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            z-index: 1000;
            max-width: 300px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- ШАПКА -->
        <div class="header">
            <div class="header-top">
                <div class="close-btn" onclick="closeApp()">
                    <i class="fas fa-chevron-left"></i> Закрыть
                </div>
                <div class="title-section">
                    <div class="main-title">WinTon</div>
                    <div class="sub-title">царь горы</div>
                </div>
                <div class="menu-btn" onclick="showMenu()">
                    <div class="menu-dot"></div>
                    <div class="menu-dot"></div>
                    <div class="menu-dot"></div>
                </div>
            </div>

            <!-- БАЛАНС -->
            <div class="balance-container">
                <div class="balance-card">
                    <div class="balance-icon">
                        <i class="fas fa-coins"></i>
                    </div>
                    <div class="balance-info">
                        <div class="balance-label">Баланс</div>
                        <div class="balance-amount" id="balanceDisplay">100 TON</div>
                    </div>
                </div>
                <button class="deposit-btn" onclick="showDeposit()">
                    <i class="fas fa-plus-circle"></i>
                    <span>Пополнить</span>
                </button>
            </div>

            <!-- ТАЙМЕР -->
            <div class="timer-container">
                <div class="timer-label">НОВЫЙ КОРОЛЬ ЧЕРЕЗ</div>
                <div class="main-timer" id="timerDisplay">200:00:00</div>
            </div>
        </div>

        <!-- БАННЕР -->
        <div class="banner" onclick="showRules()">
            <div class="banner-title">👑 Царь горы заберет больше всех</div>
            <div class="banner-link">
                Узнать правила <i class="fas fa-arrow-right"></i>
            </div>
        </div>

        <!-- КОНТЕНТ -->
        <div class="content">
            <!-- СТАТИСТИКА -->
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-icon"><i class="fas fa-paper-plane"></i></div>
                    <div class="stat-label">отправлено</div>
                    <div class="stat-value" id="totalSent">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon"><i class="fas fa-crown"></i></div>
                    <div class="stat-label">роялти</div>
                    <div class="stat-value" id="totalRoyalty">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-label">игроков</div>
                    <div class="stat-value" id="totalPlayers">0</div>
                </div>
            </div>

            <!-- ПОЗИЦИЯ -->
            <div class="section-header">
                <span><i class="fas fa-chess-queen"></i> ВАША ПОЗИЦИЯ</span>
                <span><i class="fas fa-gift"></i> ПРИЗ</span>
            </div>

            <div class="user-card">
                <div class="user-rank" id="userRank">#0</div>
                <div class="user-avatar" id="userAvatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="user-info">
                    <div class="user-name" id="userName">Загрузка...</div>
                    <div class="user-stats" id="userStats">ставок: 0</div>
                </div>
                <div class="user-prize" id="userPrize">0</div>
            </div>

            <!-- ТОП -->
            <div class="section-header">
                <span><i class="fas fa-trophy"></i> ТОП-3</span>
                <span>ВЫИГРЫШ</span>
            </div>

            <div id="topList"></div>
        </div>

        <!-- КНОПКИ -->
        <div class="action-buttons">
            <button class="action-button" onclick="showDeposit()">
                <i class="fas fa-plus-circle"></i> Пополнить
            </button>
            <button class="action-button secondary" onclick="sendGift()">
                <i class="fas fa-paper-plane"></i> Подарок
            </button>
        </div>
    </div>

    <!-- МОДАЛКА ПОПОЛНЕНИЯ -->
    <div id="depositModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-title">
                <i class="fas fa-coins"></i> Пополнение
            </div>
            <div style="background: #1a1a1a; padding: 12px; border-radius: 12px; margin-bottom: 15px; word-break: break-all; font-size: 12px;">
                <div style="color: #666; margin-bottom: 5px;">Кошелек:</div>
                UQDLH22g4oiwhpdPyljcYS6kTQQLmnFs6gNZfjizzbx9Dkpo
            </div>
            <input type="number" id="depositAmount" class="modal-input" value="10" min="1" placeholder="Сумма в TON">
            <button class="modal-button" onclick="processDeposit()">
                <i class="fas fa-qrcode"></i> Оплатить
            </button>
            <button class="modal-button secondary" onclick="closeModal('depositModal')">
                Закрыть
            </button>
        </div>
    </div>

    <!-- УВЕДОМЛЕНИЕ -->
    <div id="notification" class="notification" style="display: none;"></div>

    <script>
        // Telegram
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.BackButton.show();
            tg.BackButton.onClick(() => tg.close());
        }

        // Данные
        let user = {
            id: 'user_' + Date.now(),
            name: 'Игрок',
            balance: 100,
            totalSent: 0,
            rank: 1
        };

        let gameData = {
            totalSent: 0,
            totalRoyalty: 0,
            totalPlayers: 1,
            kingEndTime: Date.now() + 200 * 60 * 60 * 1000
        };

        // Загрузка
        function loadData() {
            try {
                // Telegram данные
                if (tg?.initDataUnsafe?.user) {
                    const tgUser = tg.initDataUnsafe.user;
                    user.name = tgUser.first_name || 'Игрок';
                    if (tgUser.last_name) user.name += ' ' + tgUser.last_name;
                }

                // Сохраненные данные
                const saved = localStorage.getItem('winton_user');
                if (saved) {
                    const savedUser = JSON.parse(saved);
                    user.balance = savedUser.balance || 100;
                    user.totalSent = savedUser.totalSent || 0;
                }

                const savedGame = localStorage.getItem('winton_game');
                if (savedGame) {
                    gameData = JSON.parse(savedGame);
                }

                updateUI();
            } catch (e) {
                console.log('Ошибка загрузки');
            }
        }

        // Сохранение
        function saveData() {
            try {
                localStorage.setItem('winton_user', JSON.stringify({
                    balance: user.balance,
                    totalSent: user.totalSent
                }));
                localStorage.setItem('winton_game', JSON.stringify(gameData));
            } catch (e) {}
        }

        // Обновление UI
        function updateUI() {
            document.getElementById('balanceDisplay').innerHTML = user.balance + ' TON';
            document.getElementById('totalSent').innerHTML = gameData.totalSent + ' TON';
            document.getElementById('totalRoyalty').innerHTML = gameData.totalRoyalty + ' TON';
            document.getElementById('totalPlayers').innerHTML = gameData.totalPlayers;
            document.getElementById('userRank').innerHTML = '#' + user.rank;
            document.getElementById('userName').innerHTML = user.name;
            document.getElementById('userStats').innerHTML = `ставок: ${user.totalSent} TON`;
            document.getElementById('userPrize').innerHTML = Math.floor(user.totalSent * 1.5) + ' TON';
        }

        // Таймер
        function updateTimer() {
            const diff = gameData.kingEndTime - Date.now();
            if (diff <= 0) {
                gameData.kingEndTime = Date.now() + 200 * 60 * 60 * 1000;
                saveData();
            }
            const hours = Math.floor(diff / (60 * 60 * 1000));
            const minutes = Math.floor((diff % (60 * 60 * 1000)) / (60 * 1000));
            const seconds = Math.floor((diff % (60 * 1000)) / 1000);
            document.getElementById('timerDisplay').innerHTML = 
                `${hours.toString().padStart(3, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        setInterval(updateTimer, 1000);

        // Пополнение
        function showDeposit() {
            document.getElementById('depositModal').style.display = 'flex';
        }

        function processDeposit() {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            if (amount < 1) {
                showNotification('Минимум 1 TON');
                return;
            }

            // Ссылка на оплату
            const link = `https://app.tonkeeper.com/transfer/UQDLH22g4oiwhpdPyljcYS6kTQQLmnFs6gNZfjizzbx9Dkpo?amount=${amount * 1000000000}&text=WinTon`;
            
            window.open(link, '_blank');
            
            showNotification('Ожидание оплаты...');
            closeModal('depositModal');

            // Имитация зачисления через 10 сек
            setTimeout(() => {
                user.balance += amount;
                saveData();
                updateUI();
                showNotification(`✅ Получено ${amount} TON`);
            }, 10000);
        }

        // Подарок
        function sendGift() {
            if (user.balance < 10) {
                showNotification('❌ Недостаточно TON');
                return;
            }

            user.balance -= 10;
            user.totalSent += 9;
            gameData.totalSent += 9;
            gameData.totalRoyalty += 1;

            saveData();
            updateUI();
            showNotification('✅ Подарок отправлен!');
        }

        // Уведомления
        function showNotification(text) {
            const notif = document.getElementById('notification');
            notif.style.display = 'block';
            notif.innerHTML = text;
            setTimeout(() => {
                notif.style.display = 'none';
            }, 3000);
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function showMenu() {
            showNotification('Меню в разработке');
        }

        function showRules() {
            showNotification('👑 Правила: Каждые 200ч новый король');
        }

        function closeApp() {
            if (tg) tg.close();
        }

        // Запуск
        loadData();
        updateTimer();
    </script>
</body>
</html>
