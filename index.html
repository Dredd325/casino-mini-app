<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Casino</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .balance {
            background: rgba(255,215,0,0.2);
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
        }
        
        .menu {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .menu-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .menu-btn.active {
            background: #ffd700;
            color: #333;
        }
        
        .game-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .king-title {
            font-size: 24px;
            margin-bottom: 15px;
            color: #ffd700;
        }
        
        .pool {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: #ffd700;
        }
        
        .bet-input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            margin-bottom: 15px;
        }
        
        .bet-input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .bet-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #333;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .bet-btn:active {
            transform: scale(0.98);
        }
        
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .nft-item {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }
        
        .nft-emoji {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .nft-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .nft-price {
            color: #ffd700;
            font-weight: bold;
        }
        
        .hidden {
            display: none;
        }
        
        .timer {
            font-size: 20px;
            text-align: center;
            margin: 15px 0;
            color: #ffd700;
        }
        
        .king-info {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <h1>🎰 TON Casino</h1>
            <div class="balance" id="balance">1000 TON</div>
        </div>
        
        <!-- Меню -->
        <div class="menu">
            <button class="menu-btn active" onclick="showTab('king')">👑 Царь горы</button>
            <button class="menu-btn" onclick="showTab('nft')">🎁 NFT</button>
        </div>
        
        <!-- Царь горы -->
        <div id="kingTab" class="">
            <div class="game-card">
                <div class="king-title">👑 ЦАРЬ ГОРЫ</div>
                
                <div class="pool" id="totalPool">1250 TON</div>
                
                <div class="king-info" id="kingInfo">
                    👑 Текущий король: <span id="currentKing">Игрок 123</span><br>
                    💰 Ставка короля: <span id="kingBet">500 TON</span>
                </div>
                
                <div class="timer" id="timer">
                    ⏰ До конца: 02:30
                </div>
                
                <input type="number" id="betAmount" class="bet-input" placeholder="Ваша ставка в TON" min="1" value="10">
                
                <button class="bet-btn" onclick="placeBet()">
                    💰 Сделать ставку
                </button>
            </div>
        </div>
        
        <!-- NFT магазин -->
        <div id="nftTab" class="hidden">
            <div class="game-card">
                <h2 style="margin-bottom: 20px;">🎁 NFT Подарки</h2>
                
                <div class="nft-grid" id="nftGrid">
                    <!-- NFT добавятся через JavaScript -->
                </div>
            </div>
            
            <div class="game-card">
                <h3 style="margin-bottom: 15px;">🎨 Мои NFT</h3>
                <div class="nft-grid" id="myNFTs"></div>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Telegram Mini App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран
        
        // Данные пользователя
        let userBalance = 1000;
        let myNFTs = [];
        
        // База данных (в памяти телефона)
        let gameData = {
            totalPool: 1250,
            currentKing: {
                id: 123,
                name: 'Игрок 123',
                bet: 500
            },
            endTime: Date.now() + 5 * 60 * 1000, // +5 минут
            nfts: [
                { id: 1, name: 'Золотой билет', emoji: '🎫', price: 100 },
                { id: 2, name: 'Бриллиант', emoji: '💎', price: 250 },
                { id: 3, name: 'Кубок', emoji: '🏆', price: 500 },
                { id: 4, name: 'Корона', emoji: '👑', price: 1000 },
                { id: 5, name: 'Редкий скин', emoji: '🎨', price: 150 },
                { id: 6, name: 'Токен удачи', emoji: '🍀', price: 75 }
            ]
        };
        
        // Сохраняем в localStorage
        if (!localStorage.getItem('gameData')) {
            localStorage.setItem('gameData', JSON.stringify(gameData));
        } else {
            gameData = JSON.parse(localStorage.getItem('gameData'));
        }
        
        if (!localStorage.getItem('userBalance')) {
            localStorage.setItem('userBalance', '1000');
        } else {
            userBalance = parseInt(localStorage.getItem('userBalance'));
        }
        
        if (!localStorage.getItem('myNFTs')) {
            localStorage.setItem('myNFTs', JSON.stringify([]));
        } else {
            myNFTs = JSON.parse(localStorage.getItem('myNFTs'));
        }
        
        // Обновляем интерфейс
        function updateUI() {
            document.getElementById('balance').innerText = userBalance + ' TON';
            document.getElementById('totalPool').innerText = gameData.totalPool + ' TON';
            document.getElementById('currentKing').innerText = gameData.currentKing.name;
            document.getElementById('kingBet').innerText = gameData.currentKing.bet + ' TON';
            
            // Обновляем таймер
            const timeLeft = Math.max(0, gameData.endTime - Date.now());
            const minutes = Math.floor(timeLeft / 60000);
            const seconds = Math.floor((timeLeft % 60000) / 1000);
            document.getElementById('timer').innerHTML = `⏰ До конца: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // Отрисовываем NFT
            renderNFTs();
        }
        
        // Переключение вкладок
        function showTab(tab) {
            document.getElementById('kingTab').classList.add('hidden');
            document.getElementById('nftTab').classList.add('hidden');
            document.getElementById(tab + 'Tab').classList.remove('hidden');
            
            // Подсветка кнопок
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        // Сделать ставку
        function placeBet() {
            const amount = parseInt(document.getElementById('betAmount').value);
            
            if (amount < 1) {
                tg.showAlert('❌ Минимальная ставка 1 TON');
                return;
            }
            
            if (amount > userBalance) {
                tg.showAlert('❌ Недостаточно средств!');
                return;
            }
            
            // Списываем баланс
            userBalance -= amount;
            gameData.totalPool += amount;
            
            // Проверяем, становится ли игрок королем
            if (amount > gameData.currentKing.bet) {
                gameData.currentKing = {
                    id: tg.initDataUnsafe?.user?.id || 123,
                    name: tg.initDataUnsafe?.user?.first_name || 'Вы',
                    bet: amount
                };
                
                tg.showAlert('👑 ВЫ СТАЛИ КОРОЛЕМ!');
            }
            
            // Сохраняем
            localStorage.setItem('userBalance', userBalance.toString());
            localStorage.setItem('gameData', JSON.stringify(gameData));
            
            updateUI();
            tg.HapticFeedback.impactOccurred('medium'); // Вибрация
        }
        
        // Отрисовка NFT
        function renderNFTs() {
            const nftGrid = document.getElementById('nftGrid');
            nftGrid.innerHTML = '';
            
            gameData.nfts.forEach(nft => {
                const div = document.createElement('div');
                div.className = 'nft-item';
                div.innerHTML = `
                    <div class="nft-emoji">${nft.emoji}</div>
                    <div class="nft-name">${nft.name}</div>
                    <div class="nft-price">${nft.price} TON</div>
                    <button onclick="buyNFT(${nft.id})" style="
                        background: #ffd700;
                        border: none;
                        color: #333;
                        padding: 5px 15px;
                        border-radius: 5px;
                        margin-top: 10px;
                        cursor: pointer;
                    ">Купить</button>
                `;
                nftGrid.appendChild(div);
            });
            
            // Мои NFT
            const myNFTsDiv = document.getElementById('myNFTs');
            myNFTsDiv.innerHTML = '';
            
            if (myNFTs.length === 0) {
                myNFTsDiv.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: rgba(255,255,255,0.5);">У вас пока нет NFT</p>';
            } else {
                myNFTs.forEach(nft => {
                    const div = document.createElement('div');
                    div.className = 'nft-item';
                    div.innerHTML = `
                        <div class="nft-emoji">${nft.emoji}</div>
                        <div class="nft-name">${nft.name}</div>
                    `;
                    myNFTsDiv.appendChild(div);
                });
            }
        }
        
        // Купить NFT
        function buyNFT(nftId) {
            const nft = gameData.nfts.find(n => n.id === nftId);
            
            if (userBalance < nft.price) {
                tg.showAlert('❌ Недостаточно средств!');
                return;
            }
            
            userBalance -= nft.price;
            myNFTs.push(nft);
            
            localStorage.setItem('userBalance', userBalance.toString());
            localStorage.setItem('myNFTs', JSON.stringify(myNFTs));
            
            updateUI();
            tg.showAlert(`🎁 Вы купили ${nft.name}!`);
            tg.HapticFeedback.notificationOccurred('success');
        }
        
        // Таймер окончания игры
        setInterval(() => {
            if (Date.now() >= gameData.endTime) {
                // Завершаем игру
                const winner = gameData.currentKing;
                tg.showAlert(`👑 ИГРА ОКОНЧЕНА!\nПобедитель: ${winner.name}\nВыигрыш: ${gameData.totalPool} TON`);
                
                // Начинаем новую игру
                gameData = {
                    totalPool: 0,
                    currentKing: {
                        id: 0,
                        name: 'Нет короля',
                        bet: 0
                    },
                    endTime: Date.now() + 5 * 60 * 1000,
                    nfts: gameData.nfts
                };
                
                localStorage.setItem('gameData', JSON.stringify(gameData));
            }
            updateUI();
        }, 1000);
        
        // Инициализация
        updateUI();
        
        // Кнопка "Назад" в Telegram
        tg.BackButton.show();
        tg.BackButton.onClick(() => {
            tg.close();
        });
    </script>
</body>
</html>
