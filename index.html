<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinTon — Царь горы</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --ton-blue: #0088cc;
            --ton-dark: #006699;
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --border-color: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent-gold: #ffd966;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .app-container {
            max-width: 430px;
            width: 100%;
            background: var(--bg-dark);
            min-height: 100vh;
            padding-bottom: 20px;
            position: relative;
        }

        /* ШАПКА */
        .header {
            background: linear-gradient(165deg, #0066aa 0%, #004477 100%);
            padding: 40px 16px 25px 16px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-btn {
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 30px;
            cursor: pointer;
            z-index: 10;
        }

        .title-section {
            text-align: center;
        }

        .main-title {
            font-size: 26px;
            font-weight: 800;
            color: white;
        }

        .sub-title {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .menu-btn {
            width: 44px;
            height: 44px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            z-index: 10;
            background: rgba(0,0,0,0.2);
        }

        .menu-dot {
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
        }

        /* Баланс */
        .balance-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .balance-card {
            flex: 1;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .balance-icon {
            background: var(--ton-blue);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .balance-icon i {
            color: white;
            font-size: 20px;
        }

        .balance-info {
            flex: 1;
        }

        .balance-label {
            font-size: 12px;
            color: #aaa;
        }

        .balance-amount {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .deposit-btn {
            background: var(--ton-blue);
            border: none;
            border-radius: 30px;
            padding: 0 20px;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            z-index: 10;
        }

        /* Таймер */
        .timer-container {
            text-align: center;
        }

        .timer-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 5px;
        }

        .main-timer {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 2px;
            color: white;
            text-shadow: 0 0 10px rgba(0,136,204,0.5);
        }

        /* Баннер */
        .banner {
            background: #022b40;
            padding: 16px;
            margin: 0 16px 20px 16px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 10;
        }

        .banner-title {
            font-size: 16px;
            font-weight: 600;
            color: white;
            margin-bottom: 5px;
        }

        .banner-link {
            color: #44aaff;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Контент */
        .content {
            padding: 0 16px;
        }

        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .stat-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 15px 5px;
            text-align: center;
        }

        .stat-icon {
            width: 36px;
            height: 36px;
            background: rgba(0,136,204,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
        }

        .stat-icon i {
            color: var(--ton-blue);
            font-size: 18px;
        }

        .stat-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        /* Позиция */
        .section-header {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .user-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .user-rank {
            font-size: 20px;
            font-weight: 700;
            color: var(--ton-blue);
            min-width: 35px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--ton-blue);
            color: var(--ton-blue);
            font-size: 20px;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            color: white;
            margin-bottom: 2px;
        }

        .user-stats {
            font-size: 11px;
            color: #666;
        }

        .user-prize {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-gold);
        }

        /* Топ */
        .top-list {
            margin-bottom: 20px;
        }

        .top-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .top-rank {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            background: var(--ton-blue);
            color: white;
        }

        .top-rank.gold { background: #f5a623; }
        .top-rank.silver { background: #9b9b9b; }
        .top-rank.bronze { background: #b87333; }

        .top-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--ton-blue);
            color: var(--ton-blue);
            overflow: hidden;
        }

        .top-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .top-info {
            flex: 1;
        }

        .top-name {
            font-weight: 500;
            color: white;
            font-size: 14px;
        }

        .top-amount {
            font-weight: 600;
            color: var(--accent-gold);
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
        }

        .ton-badge {
            background: var(--ton-blue);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        /* Кнопки */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin: 20px 16px;
            position: relative;
            z-index: 20;
        }

        .action-button {
            flex: 1;
            background: var(--ton-blue);
            border: none;
            border-radius: 30px;
            padding: 16px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            z-index: 20;
            pointer-events: auto;
        }

        .action-button.secondary {
            background: var(--card-bg);
            border: 1px solid var(--ton-blue);
        }

        .action-button:active {
            opacity: 0.8;
        }

        /* Модалка */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 25px;
            max-width: 340px;
            width: 100%;
            border: 1px solid var(--border-color);
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--ton-blue);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-input {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: white;
            font-size: 18px;
            margin: 15px 0;
        }

        .modal-button {
            background: var(--ton-blue);
            border: none;
            color: white;
            font-weight: 600;
            padding: 16px;
            border-radius: 30px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .modal-button.secondary {
            background: transparent;
            border: 1px solid var(--border-color);
        }

        /* Уведомление */
        .notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border-left: 4px solid var(--ton-blue);
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            z-index: 2000;
            max-width: 300px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- ШАПКА -->
        <div class="header">
            <div class="header-top">
                <div class="close-btn" onclick="window.app?.closeApp()">
                    <i class="fas fa-chevron-left"></i> Закрыть
                </div>
                <div class="title-section">
                    <div class="main-title">WinTon</div>
                    <div class="sub-title">царь горы</div>
                </div>
                <div class="menu-btn" onclick="window.app?.showMenu()">
                    <div class="menu-dot"></div>
                    <div class="menu-dot"></div>
                    <div class="menu-dot"></div>
                </div>
            </div>

            <!-- БАЛАНС -->
            <div class="balance-container">
                <div class="balance-card">
                    <div class="balance-icon">
                        <i class="fas fa-coins"></i>
                    </div>
                    <div class="balance-info">
                        <div class="balance-label">Баланс</div>
                        <div class="balance-amount" id="balanceDisplay">100 TON</div>
                    </div>
                </div>
                <button class="deposit-btn" onclick="window.app?.showDeposit()">
                    <i class="fas fa-plus-circle"></i>
                    <span>Пополнить</span>
                </button>
            </div>

            <!-- ТАЙМЕР -->
            <div class="timer-container">
                <div class="timer-label">НОВЫЙ КОРОЛЬ ЧЕРЕЗ</div>
                <div class="main-timer" id="timerDisplay">200:00:00</div>
            </div>
        </div>

        <!-- БАННЕР -->
        <div class="banner" onclick="window.app?.showRules()">
            <div class="banner-title">👑 Царь горы заберет больше всех</div>
            <div class="banner-link">
                Узнать правила <i class="fas fa-arrow-right"></i>
            </div>
        </div>

        <!-- КОНТЕНТ -->
        <div class="content">
            <!-- СТАТИСТИКА -->
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-icon"><i class="fas fa-paper-plane"></i></div>
                    <div class="stat-label">отправлено</div>
                    <div class="stat-value" id="totalSent">0 TON</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon"><i class="fas fa-crown"></i></div>
                    <div class="stat-label">роялти</div>
                    <div class="stat-value" id="totalRoyalty">0 TON</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-label">игроков</div>
                    <div class="stat-value" id="totalPlayers">1</div>
                </div>
            </div>

            <!-- ПОЗИЦИЯ -->
            <div class="section-header">
                <span><i class="fas fa-chess-queen"></i> ВАША ПОЗИЦИЯ</span>
                <span><i class="fas fa-gift"></i> ПРИЗ</span>
            </div>

            <div class="user-card">
                <div class="user-rank" id="userRank">#1</div>
                <div class="user-avatar" id="userAvatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="user-info">
                    <div class="user-name" id="userName">Загрузка...</div>
                    <div class="user-stats" id="userStats">ставок: 0 TON</div>
                </div>
                <div class="user-prize" id="userPrize">0 TON</div>
            </div>

            <!-- ТОП -->
            <div class="section-header">
                <span><i class="fas fa-trophy"></i> ТОП-3</span>
                <span>ВЫИГРЫШ</span>
            </div>

            <div id="topList" class="top-list"></div>
        </div>

        <!-- КНОПКИ -->
        <div class="action-buttons">
            <button class="action-button" onclick="window.app?.showDeposit()">
                <i class="fas fa-plus-circle"></i> Пополнить
            </button>
            <button class="action-button secondary" onclick="window.app?.sendGift()">
                <i class="fas fa-paper-plane"></i> Подарок (10 TON)
            </button>
        </div>
    </div>

    <!-- МОДАЛКА ПОПОЛНЕНИЯ -->
    <div id="depositModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-title">
                <i class="fas fa-coins"></i> Пополнение
            </div>
            
            <div style="background: #1a1a1a; padding: 12px; border-radius: 12px; margin-bottom: 15px; word-break: break-all; font-size: 12px;">
                <div style="color: #666; margin-bottom: 5px;">Кошелек:</div>
                UQDLH22g4oiwhpdPyljcYS6kTQQLmnFs6gNZfjizzbx9Dkpo
            </div>

            <input type="number" id="depositAmount" class="modal-input" value="10" min="1" placeholder="Сумма в TON">

            <button class="modal-button" id="payButton" onclick="window.app?.processDeposit()">
                <i class="fas fa-qrcode"></i> Оплатить
            </button>
            <button class="modal-button secondary" onclick="window.app?.closeModal('depositModal')">
                Закрыть
            </button>
        </div>
    </div>

    <!-- УВЕДОМЛЕНИЕ -->
    <div id="notification" class="notification" style="display: none;"></div>

    <script>
        // ===============================================
        // КОНФИГУРАЦИЯ
        // ===============================================

        const CONFIG = {
            WALLET: 'UQDLH22g4oiwhpdPyljcYS6kTQQLmnFs6gNZfjizzbx9Dkpo',
            API_KEY: '2bb23abbae4917d842f4accd61f454f683338fc2fd5f2b2231ac4df59cd4cf2f'
        };

        // ===============================================
        // ОСНОВНОЙ КЛАСС
        // ===============================================

        class WinTonApp {
            constructor() {
                this.tg = window.Telegram?.WebApp;
                
                // Данные пользователя
                this.user = {
                    id: '',
                    name: 'Загрузка...',
                    avatar: null,
                    balance: 100,
                    totalSent: 0
                };
                
                // Все игроки
                this.players = [];
                
                this.gameData = {
                    totalSent: 0,
                    totalRoyalty: 0,
                    kingEndTime: Date.now() + 200 * 60 * 60 * 1000
                };

                this.init();
            }

            init() {
                // Telegram данные
                if (this.tg) {
                    this.tg.expand();
                    this.tg.BackButton.show();
                    this.tg.BackButton.onClick(() => this.closeApp());
                    
                    const tgUser = this.tg.initDataUnsafe?.user;
                    if (tgUser) {
                        this.user.id = tgUser.id.toString();
                        this.user.name = tgUser.first_name || 'Игрок';
                        if (tgUser.last_name) {
                            this.user.name += ' ' + tgUser.last_name;
                        }
                        if (tgUser.photo_url) {
                            this.user.avatar = tgUser.photo_url;
                        }
                    }
                } else {
                    this.user.id = 'test_' + Date.now();
                    this.user.name = 'Тестовый игрок';
                }

                // Загружаем всех игроков
                this.loadPlayers();
                
                // Добавляем текущего игрока если его нет
                this.addCurrentPlayer();
                
                // Загружаем игру
                this.loadGameData();
                
                // Обновляем UI
                this.updateUI();
                this.updateTopList();
                
                // Таймер
                this.startTimer();
                
                window.app = this;
            }

            // ===============================================
            // РАБОТА С ИГРОКАМИ
            // ===============================================

            loadPlayers() {
                try {
                    const saved = localStorage.getItem('winton_players');
                    this.players = saved ? JSON.parse(saved) : [];
                } catch (e) {
                    this.players = [];
                }
            }

            savePlayers() {
                localStorage.setItem('winton_players', JSON.stringify(this.players));
            }

            addCurrentPlayer() {
                // Ищем игрока
                let player = this.players.find(p => p.id === this.user.id);
                
                if (player) {
                    // Обновляем данные
                    player.name = this.user.name;
                    player.avatar = this.user.avatar;
                    player.lastActive = Date.now();
                    this.user.balance = player.balance;
                    this.user.totalSent = player.totalSent;
                } else {
                    // Новый игрок
                    player = {
                        id: this.user.id,
                        name: this.user.name,
                        avatar: this.user.avatar,
                        balance: 100,
                        totalSent: 0,
                        registeredAt: Date.now(),
                        lastActive: Date.now()
                    };
                    this.players.push(player);
                }
                
                this.savePlayers();
                this.updateGameStats();
            }

            updatePlayer(data) {
                const index = this.players.findIndex(p => p.id === this.user.id);
                if (index !== -1) {
                    this.players[index] = {
                        ...this.players[index],
                        ...data,
                        lastActive: Date.now()
                    };
                    this.savePlayers();
                    this.updateGameStats();
                }
            }

            // ===============================================
            // СТАТИСТИКА ИГРЫ
            // ===============================================

            updateGameStats() {
                // Общая сумма отправленного
                this.gameData.totalSent = this.players.reduce((sum, p) => sum + (p.totalSent || 0), 0);
                
                // Количество игроков
                const playersCount = this.players.length;
                
                document.getElementById('totalSent').innerHTML = this.gameData.totalSent + ' TON';
                document.getElementById('totalRoyalty').innerHTML = Math.floor(this.gameData.totalSent * 0.1) + ' TON';
                document.getElementById('totalPlayers').innerHTML = playersCount;
                
                this.saveGameData();
            }

            // ===============================================
            // ПОПОЛНЕНИЕ (ТОЛЬКО ЧЕРЕЗ РЕАЛЬНУЮ ОПЛАТУ)
            // ===============================================

            showDeposit() {
                document.getElementById('depositModal').style.display = 'flex';
            }

            processDeposit() {
                const amount = parseFloat(document.getElementById('depositAmount').value);
                
                if (amount < 1) {
                    this.showNotification('Минимум 1 TON');
                    return;
                }

                // СОХРАНЯЕМ ЗАПРОС, НО НЕ НАЧИСЛЯЕМ!
                const paymentId = 'pay_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                
                // Сохраняем в ожидающие платежи
                const pendingPayments = JSON.parse(localStorage.getItem('pending_payments') || '[]');
                pendingPayments.push({
                    id: paymentId,
                    userId: this.user.id,
                    amount: amount,
                    time: Date.now()
                });
                localStorage.setItem('pending_payments', JSON.stringify(pendingPayments));

                // Ссылка на оплату
                const nanoAmount = amount * 1000000000;
                const paymentLink = `https://app.tonkeeper.com/transfer/${CONFIG.WALLET}?amount=${nanoAmount}&text=WinTon%20${encodeURIComponent(this.user.name)}`;

                window.open(paymentLink, '_blank');
                
                this.closeModal('depositModal');
                
                // Уведомление
                this.showNotification('⏳ После оплаты баланс обновится в течение минуты');

                // ЗАПУСКАЕМ ПРОВЕРКУ
                setTimeout(() => this.checkPayment(paymentId, amount), 5000);
            }

            // Проверка платежа
            async checkPayment(paymentId, expectedAmount) {
                try {
                    const response = await fetch(
                        `https://toncenter.com/api/v2/getTransactions?address=${CONFIG.WALLET}&limit=10&api_key=${CONFIG.API_KEY}`
                    );
                    
                    const data = await response.json();
                    
                    if (data.ok && data.result) {
                        for (const tx of data.result) {
                            if (!tx.in_msg) continue;
                            
                            const amount = tx.in_msg.value / 1000000000;
                            
                            // Нашли транзакцию
                            if (Math.abs(amount - expectedAmount) < 0.1) {
                                // Проверяем не обработана ли уже
                                const processed = JSON.parse(localStorage.getItem('processed_payments') || '[]');
                                
                                if (!processed.includes(tx.transaction_id?.hash)) {
                                    // Начисляем баланс
                                    this.user.balance += amount;
                                    this.updatePlayer({ balance: this.user.balance });
                                    
                                    // Сохраняем как обработанную
                                    processed.push(tx.transaction_id?.hash);
                                    localStorage.setItem('processed_payments', JSON.stringify(processed));
                                    
                                    // Удаляем из ожидающих
                                    const pending = JSON.parse(localStorage.getItem('pending_payments') || '[]');
                                    localStorage.setItem('pending_payments', JSON.stringify(
                                        pending.filter(p => p.id !== paymentId)
                                    ));
                                    
                                    this.updateUI();
                                    this.showNotification(`✅ Получено ${amount} TON!`);
                                    return;
                                }
                            }
                        }
                    }
                    
                    // Если не нашли - проверяем еще через 5 секунд
                    setTimeout(() => this.checkPayment(paymentId, expectedAmount), 5000);
                    
                } catch (error) {
                    console.log('Ошибка проверки');
                    setTimeout(() => this.checkPayment(paymentId, expectedAmount), 5000);
                }
            }

            // ===============================================
            // ОТПРАВКА ПОДАРКА
            // ===============================================

            sendGift() {
                if (this.user.balance < 10) {
                    this.showNotification('❌ Нужно 10 TON');
                    return;
                }

                // Списываем
                this.user.balance -= 10;
                this.user.totalSent += 9;
                
                // Обновляем игрока
                this.updatePlayer({
                    balance: this.user.balance,
                    totalSent: this.user.totalSent
                });

                // Обновляем статистику
                this.updateGameStats();
                
                // Обновляем UI
                this.updateUI();
                this.updateTopList();
                
                this.showNotification('✅ Подарок отправлен! +9 TON');
                
                if (this.tg) {
                    this.tg.HapticFeedback.notificationOccurred('success');
                }
            }

            // ===============================================
            // ТОП-3
            // ===============================================

            updateTopList() {
                const topPlayers = [...this.players]
                    .filter(p => p.totalSent > 0)
                    .sort((a, b) => (b.totalSent || 0) - (a.totalSent || 0))
                    .slice(0, 3);

                const topList = document.getElementById('topList');
                
                if (topPlayers.length === 0) {
                    topList.innerHTML = `
                        <div class="top-item">
                            <div class="top-rank gold">1</div>
                            <div class="top-avatar"><i class="fas fa-user"></i></div>
                            <div class="top-info">
                                <div class="top-name">Пока нет игроков</div>
                            </div>
                            <div class="top-amount">0</div>
                        </div>
                    `;
                    return;
                }

                topList.innerHTML = topPlayers.map((player, index) => {
                    const rankClass = index === 0 ? 'gold' : (index === 1 ? 'silver' : 'bronze');
                    
                    const avatarHtml = player.avatar 
                        ? `<img src="${player.avatar}" alt="avatar">`
                        : `<i class="fas fa-user"></i>`;
                    
                    return `
                        <div class="top-item">
                            <div class="top-rank ${rankClass}">${index + 1}</div>
                            <div class="top-avatar">${avatarHtml}</div>
                            <div class="top-info">
                                <div class="top-name">${player.name}</div>
                            </div>
                            <div class="top-amount">
                                <span class="ton-badge">TON</span>
                                ${player.totalSent || 0}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // ===============================================
            // UI
            // ===============================================

            updateUI() {
                document.getElementById('balanceDisplay').innerHTML = this.user.balance + ' TON';
                document.getElementById('userRank').innerHTML = '#' + this.getUserRank();
                document.getElementById('userName').innerHTML = this.user.name;
                document.getElementById('userStats').innerHTML = 'ставок: ' + (this.user.totalSent || 0) + ' TON';
                document.getElementById('userPrize').innerHTML = Math.floor((this.user.totalSent || 0) * 1.5) + ' TON';
                
                const avatarDiv = document.getElementById('userAvatar');
                if (this.user.avatar) {
                    avatarDiv.innerHTML = `<img src="${this.user.avatar}" alt="avatar">`;
                } else {
                    avatarDiv.innerHTML = '<i class="fas fa-user"></i>';
                }
            }

            getUserRank() {
                const sorted = [...this.players].sort((a, b) => (b.totalSent || 0) - (a.totalSent || 0));
                const index = sorted.findIndex(p => p.id === this.user.id);
                return index + 1;
            }

            startTimer() {
                setInterval(() => {
                    const diff = this.gameData.kingEndTime - Date.now();
                    if (diff <= 0) {
                        this.gameData.kingEndTime = Date.now() + 200 * 60 * 60 * 1000;
                        this.saveGameData();
                        
                        // Определяем победителя
                        const winner = [...this.players].sort((a, b) => (b.totalSent || 0) - (a.totalSent || 0))[0];
                        if (winner) {
                            this.showNotification(`👑 ${winner.name} стал королем!`);
                        }
                    }
                    const hours = Math.floor(diff / (60 * 60 * 1000));
                    const minutes = Math.floor((diff % (60 * 60 * 1000)) / (60 * 1000));
                    const seconds = Math.floor((diff % (60 * 1000)) / 1000);
                    document.getElementById('timerDisplay').innerHTML = 
                        `${hours.toString().padStart(3, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }, 1000);
            }

            loadGameData() {
                try {
                    const saved = localStorage.getItem('winton_game');
                    if (saved) {
                        this.gameData = JSON.parse(saved);
                    }
                } catch (e) {}
            }

            saveGameData() {
                localStorage.setItem('winton_game', JSON.stringify(this.gameData));
            }

            showNotification(text) {
                const notif = document.getElementById('notification');
                notif.style.display = 'block';
                notif.innerHTML = text;
                setTimeout(() => {
                    notif.style.display = 'none';
                }, 3000);
            }

            closeModal(id) {
                document.getElementById(id).style.display = 'none';
            }

            showMenu() {
                this.showNotification('👤 ' + this.user.name);
            }

            showRules() {
                this.showNotification('👑 Каждые 200ч новый король');
            }

            closeApp() {
                if (this.tg) this.tg.close();
            }
        }

        // ===============================================
        // ЗАПУСК
        // ===============================================

        document.addEventListener('DOMContentLoaded', () => {
            new WinTonApp();
        });
    </script>
</body>
